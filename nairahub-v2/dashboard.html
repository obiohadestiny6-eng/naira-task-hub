<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NairaTask</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass-card { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
    </style>
</head>
<body class="pb-24">

    <div class="bg-white px-6 py-5 border-b border-gray-100 flex justify-between items-center sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-black text-gray-900">Naira<span class="text-green-500">Task</span></h1>
            <p id="userName" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-0.5 italic">Syncing...</p>
        </div>
        <button onclick="logoutUser()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-red-100 active:scale-95 transition">
            Logout 🚪
        </button>
    </div>

    <div class="p-6">
        <div class="glass-card p-8 rounded-[35px] text-white shadow-2xl shadow-green-200 relative overflow-hidden">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-white opacity-10 rounded-full"></div>
            
            <p class="text-green-100 text-xs font-semibold uppercase tracking-wider">Available Balance</p>
            <h2 class="text-5xl font-black mt-3 tracking-tighter">₦<span id="balance">0.00</span></h2>
            
            <button onclick="window.location.href='withdraw.html'" class="mt-8 w-full bg-white text-green-700 font-extrabold py-4 rounded-2xl shadow-lg active:scale-95 transition">
                Withdraw Funds 💰
            </button>
        </div>

        <button onclick="window.location.href='payouts.html'" class="w-full mt-4 bg-white border border-gray-100 text-gray-500 font-bold py-4 rounded-2xl flex justify-between items-center px-6 active:scale-95 transition">
            <span class="text-[11px] uppercase tracking-widest">View Payout History</span>
            <span class="text-green-500 text-lg font-black">➔</span>
        </button>
    </div>

    <div class="px-6 space-y-4">
        <h3 class="text-lg font-bold text-gray-900 ml-1">Available Tasks</h3>
        <div class="bg-white p-5 rounded-[20px] border border-gray-100 flex justify-between items-center shadow-sm">
            <div>
                <p class="font-bold text-gray-900 text-sm">Follow on TikTok</p>
                <p class="text-[11px] text-green-600 font-bold mt-0.5">+ ₦50.00 Reward</p>
            </div>
            <button class="bg-gray-900 text-white px-5 py-2 rounded-xl text-[10px] font-bold uppercase tracking-tight">Start</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAPJbdsaGPxgdrb4pTxyQwybqJ4xJ_RCVQ",
            authDomain: "nairataskhub-v2.firebaseapp.com",
            projectId: "nairataskhub-v2",
            storageBucket: "nairataskhub-v2.firebasestorage.app",
            messagingSenderId: "817684965148",
            appId: "1:817684965148:web:0e3439fd6072b955a77cd9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function logoutUser() {
            if(confirm("Exit Dashboard?")) {
                firebase.auth().signOut().then(() => {
                    window.location.replace("index.html");
                });
            }
        }

        // PERSISTENT SESSION CHECK
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('userName').innerText = user.displayName || "Active Member";
                db.collection('users').doc(user.uid).onSnapshot((doc) => {
                    if (doc.exists) {
                        const amount = doc.data().balance || 0;
                        document.getElementById('balance').innerText = amount.toLocaleString(undefined, {minimumFractionDigits: 2});
                    }
                });
            } else {
                // If no user found, wait 4 seconds before redirecting.
                // This gives the phone enough time to find the saved session.
                setTimeout(() => {
                    if (!firebase.auth().currentUser) {
                        window.location.replace("index.html");
                    }
                }, 4000);
            }
        });
    </script>
</body>
</html>
