<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History | NairaTaskHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-gray-800">History 📜</h1>
            <a href="dashboard.html" class="text-green-600 font-bold text-sm">Back</a>
        </div>

        <div id="historyList" class="space-y-4">
    </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAPJbdsaGPxgdrb4pTxyQwybqJ4xJ_RCVQ",
            authDomain: "nairataskhub-v2.firebaseapp.com",
            projectId: "nairataskhub-v2",
            storageBucket: "nairataskhub-v2.firebasestorage.app",
            messagingSenderId: "817684965148",
            appId: "1:817684965148:web:0e3439fd6072b955a77cd9",
            measurementId: "G-YXFR5937ZV"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        firebase.firebase.auth().onAuthStateChanged(user => {
            if (user) {
                // USER IS FOUND - Load the history
                db.collection('withdrawals')
                  .where('email', '==', user.email)
                  .orderBy('timestamp', 'desc')
                  .onSnapshot(snapshot => {
                      const list = document.getElementById('historyList');
                      list.innerHTML = ""; 

                      if (snapshot.empty) {
                          list.innerHTML = "<div class='text-center py-10 text-gray-400'>No history found yet.</div>";
                          return;
                      }

                      snapshot.forEach(doc => {
                          const data = doc.data();
                          const color = data.status === 'approved' ? 'text-green-600 bg-green-50' : 'text-orange-600 bg-orange-50';
                          list.innerHTML += `
                              <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center mb-3">
                                  <div>
                                      <p class="text-lg font-black text-gray-800">₦${data.amount}</p>
                                      <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">${data.bank}</p>
                                  </div>
                                  <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${color}">${data.status}</span>
                              </div>`;
                      });
                  }, error => {
                      // If there is a Firebase error (like missing Index), show it here
                      console.log("Error:", error.message);
                      document.getElementById('historyList').innerHTML = "<p class='text-center text-red-400'>Please wait for database to sync...</p>";
                  });
            } else {
                // ONLY log out if the user is definitely NOT logged in
                // We wait 2 seconds before redirecting to be safe
                setTimeout(() => {
                    if (!firebase.auth().currentUser) {
                        window.location.href = "index.html";
                    }
                }, 2000);
            }
        });(user => {
            if (user) {
                // This is the "Snapshot" - it watches for real-time changes
                db.collection('withdrawals')
                  .where('email', '==', user.email)
                  .orderBy('timestamp', 'desc') // Shows newest at the top
                  .onSnapshot(snapshot => {
                      const list = document.getElementById('historyList');
                      
                      // This removes the "Loading..." text as soon as data arrives
                      list.innerHTML = ""; 

                      if (snapshot.empty) {
                          list.innerHTML = "<div class='text-center py-10 text-gray-400'>No history found.</div>";
                          return;
                      }

                      snapshot.forEach(doc => {
                          const data = doc.data();
                          // Set colors: Green for approved, Orange for pending
                          const color = data.status === 'approved' ? 'text-green-600 bg-green-50' : 'text-orange-600 bg-orange-50';
                          
                          list.innerHTML += `
                              <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center mb-3">
                                  <div>
                                      <p class="text-lg font-black text-gray-800">₦${data.amount}</p>
                                      <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">${data.bank}</p>
                                  </div>
                                  <div class="text-right">
                                      <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${color}">
                                          ${data.status}
                                      </span>
                                  </div>
                              </div>`;
                      });
                  });
            } else {
                // If not logged in, send them back to login
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
