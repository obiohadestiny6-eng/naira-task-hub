<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NairaTaskHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .btn-task { background: white; border: 1px solid #e2e8f0; border-radius: 16px; transition: all 0.2s; }
        .btn-task:hover { border-color: #22c55e; background: #f0fdf4; }
    </style>
</head>
<body class="pb-20">

    <div class="bg-white px-6 py-6 border-b border-gray-100 flex justify-between items-center sticky top-0 z-10">
        <h1 class="text-xl font-bold text-gray-900">Naira<span class="text-green-500">Task</span></h1>
        <div class="flex items-center gap-3">
            <div id="userName" class="text-sm font-semibold text-gray-600 bg-gray-100 px-4 py-2 rounded-full">Loading...</div>
            <button onclick="logoutUser()" class="bg-red-50 text-red-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase border border-red-100 active:scale-95 transition">
                Logout 🚪
            </button>
        </div>
    </div>

    <div class="p-6">
        <div class="bg-gradient-to-br from-green-500 to-green-700 p-8 rounded-[32px] text-white shadow-xl shadow-green-100 relative overflow-hidden">
            <p class="text-green-100 text-sm font-medium">Available Balance</p>
            <h2 class="text-5xl font-black mt-2 tracking-tighter">₦<span id="balance">0.00</span></h2>

            <button onclick="window.location.href='withdraw.html'" class="mt-6 w-full bg-white text-green-700 font-extrabold py-4 rounded-2xl shadow-lg transition active:scale-95">
                Withdraw Funds 💰
            </button>
        </div>

        <button onclick="window.location.href='payouts.html'" class="w-full mt-4 bg-white border border-gray-100 text-gray-500 font-bold py-4 rounded-2xl flex justify-between items-center px-6 transition active:scale-95">
            <span class="text-xs">View Payout History</span>
            <span class="text-green-600 text-sm">➔</span>
        </button>
    </div>

    <div class="px-6 space-y-4">
        <h3 class="text-lg font-bold text-gray-900 ml-1">Tasks</h3>
        <div class="btn-task p-5 flex justify-between items-center">
            <div>
                <p class="font-bold text-gray-900">Follow on TikTok</p>
                <p class="text-xs text-gray-500">Reward: ₦50.00</p>
            </div>
            <button class="bg-green-500 text-white px-4 py-2 rounded-lg text-xs font-bold">Start Task</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAPJbdsaGPxgdrb4pTxyQwybqJ4xJ_RCVQ",
            authDomain: "nairataskhub-v2.firebaseapp.com",
            projectId: "nairataskhub-v2",
            storageBucket: "nairataskhub-v2.firebasestorage.app",
            messagingSenderId: "817684965148",
            appId: "1:817684965148:web:0e3439fd6072b955a77cd9",
            measurementId: "G-YXFR5937ZV"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Logout Function
        function logoutUser() {
            firebase.auth().signOut().then(() => {
                window.location.href = "index.html";
            });
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('userName').innerText = user.displayName || "User";
                db.collection('users').doc(user.uid).onSnapshot((doc) => {
                    if (doc.exists) {
                        document.getElementById('balance').innerText = doc.data().balance.toFixed(2);
                    }
                });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
