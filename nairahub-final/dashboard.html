<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NairaTaskHub - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Mobile Sidebar Logic */
        @media (max-width: 768px) {
            #sidebar {
                transform: translateX(-100%); /* Hide off-screen by default */
                transition: transform 0.3s ease-in-out;
            }
            #sidebar.open {
                transform: translateX(0); /* Slide in when 'open' class is added */
            }
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans overflow-x-hidden">

    <nav class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center fixed top-0 left-0 right-0 z-50">
        <div class="flex items-center">
            <button onclick="toggleMenu()" class="md:hidden text-green-400 text-2xl mr-4 focus:outline-none">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="text-xl font-bold text-green-400">NairaTaskHub</h1>
        </div>
        <div class="flex items-center space-x-3">
            <span class="text-gray-400 text-sm hidden sm:inline">Welcome, User</span>
            <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center text-xl font-bold text-gray-900 shadow-lg">K</div>
        </div>
    </nav>

    <div id="backdrop" class="fixed inset-0 bg-black/60 z-40 hidden" onclick="toggleMenu()"></div>

    <div class="flex pt-[73px]">
        <aside id="sidebar" class="w-64 bg-gray-800 border-r border-gray-700 p-6 fixed inset-y-0 left-0 z-50 md:sticky md:top-[73px] md:h-[calc(100vh-73px)]">
            
            <div class="flex justify-end md:hidden mb-4">
                <button onclick="toggleMenu()" class="text-red-400 text-2xl p-2">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <nav class="space-y-4">
                <a href="#" class="block text-green-400 font-bold bg-gray-700/50 p-3 rounded-lg flex items-center">
                    <i class="fas fa-home mr-3"></i> Overview
                </a>
                <a href="tasks.html" class="block text-gray-400 hover:text-white p-3 hover:bg-gray-700 rounded-lg flex items-center transition">
                    <i class="fas fa-tasks mr-3"></i> My Tasks
                </a>
                <a href="wallet.html" class="block text-gray-400 hover:text-white p-3 hover:bg-gray-700 rounded-lg flex items-center transition">
                    <i class="fas fa-wallet mr-3"></i> Wallet
                </a>
                <a href="index.html" class="block text-red-400 hover:text-red-300 p-3 flex items-center mt-10">
                    <i class="fas fa-sign-out-alt mr-3"></i> Logout
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-8 w-full min-h-screen">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg border-t-4 border-t-green-500">
                    <p class="text-gray-400 text-xs uppercase tracking-wider">Total Earnings</p>
                    <h2 class="text-3xl font-bold text-green-400 mt-1">₦25,400</h2>
                </div>
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg border-t-4 border-t-blue-500">
                    <p class="text-gray-400 text-xs uppercase tracking-wider">Pending Tasks</p>
                    <h2 class="text-3xl font-bold text-blue-400 mt-1">12</h2>
                </div>
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg border-t-4 border-t-purple-500">
                    <p class="text-gray-400 text-xs uppercase tracking-wider">Completion Rate</p>
                    <h2 class="text-3xl font-bold text-purple-400 mt-1">85%</h2>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h3 class="text-xl font-bold mb-6 flex items-center italic">
                    <i class="fas fa-bolt text-yellow-400 mr-2"></i> Recent NairaTaskHub Tasks
                </h3>
                <div class="space-y-3">
                    <div class="flex justify-between items-center p-4 bg-gray-700/50 rounded-lg hover:bg-gray-700 transition border border-gray-600">
                        <span class="text-sm sm:text-base">Follow NairaTaskHub on X</span>
                        <span class="text-green-400 font-bold">+₦100</span>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-gray-700/50 rounded-lg hover:bg-gray-700 transition border border-gray-600">
                        <span class="text-sm sm:text-base">Join Telegram Channel</span>
                        <span class="text-green-400 font-bold">+₦50</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('backdrop');
            
            sidebar.classList.toggle('open');
            backdrop.classList.toggle('hidden');
            
            // Lock background scrolling when menu is open
            if (sidebar.classList.contains('open')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }
    </script>
</body>
</html>
