<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | NairaTaskHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .active-tab { border-bottom: 4px solid #4ade80; color: #4ade80; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-white font-sans min-h-screen">

    <div class="bg-[#161b29] p-6 border-b border-gray-800 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <h1 class="text-2xl font-black italic tracking-tighter text-green-400">NAIRATASKHUB <span class="text-gray-500 text-xs uppercase not-italic ml-2">Admin</span></h1>
            <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center text-black font-bold">AD</div>
        </div>
    </div>

    <div class="flex bg-[#161b29] border-b border-gray-800 sticky top-[81px] z-40">
        <button onclick="switchTab('task-section', this)" class="flex-1 py-4 font-bold text-sm uppercase tracking-widest active-tab">Tasks</button>
        <button onclick="switchTab('payout-section', this)" class="flex-1 py-4 font-bold text-sm uppercase tracking-widest">Payouts</button>
    </div>

    <div class="p-6 max-w-4xl mx-auto">

        <div id="task-section" class="tab-content">
            <div class="bg-[#1c2233] p-6 rounded-[2rem] border border-gray-800 shadow-2xl mb-8">
                <h2 class="text-lg font-black mb-6 flex items-center"><i class="fas fa-plus-circle mr-3 text-blue-500"></i> PUBLISH NEW TASK</h2>
                <div class="space-y-4">
                    <input type="text" placeholder="Task Name (e.g. Follow on X)" class="w-full bg-[#0b0f1a] border border-gray-800 rounded-2xl p-4 text-sm outline-none focus:border-blue-500">
                    <input type="text" placeholder="Direct Task Link (URL)" class="w-full bg-[#0b0f1a] border border-gray-800 rounded-2xl p-4 text-sm outline-none focus:border-blue-500">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" placeholder="Reward (₦)" class="w-full bg-[#0b0f1a] border border-gray-800 rounded-2xl p-4 text-sm outline-none focus:border-blue-500">
                        <select class="bg-[#0b0f1a] border border-gray-800 rounded-2xl p-4 text-sm outline-none text-gray-400">
                            <option>Social Media</option>
                            <option>Survey</option>
                            <option>Bonus</option>
                        </select>
                    </div>
                    <button class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-blue-900/20">Go Live Now</button>
                </div>
            </div>
        </div>

        <div id="payout-section" class="tab-content hidden">
            <h2 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-4">Pending Requests</h2>
            
            <div id="req1" class="bg-[#1c2233] p-6 rounded-[2rem] border border-gray-800 shadow-xl mb-6">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="font-black text-xl italic">DESTINY OFFICIAL</h3>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Requested ₦5,000</p>
                    </div>
                    <span class="text-green-400 font-black text-2xl tracking-tighter italic">₦5,000</span>
                </div>

                <div class="bg-[#0b0f1a] p-5 rounded-2xl space-y-3 mb-6 border border-gray-800">
                    <div class="flex justify-between text-xs"><span class="text-gray-500">ACC NAME:</span> <span class="font-bold">DESTINY OBIOHA</span></div>
                    <div class="flex justify-between text-xs"><span class="text-gray-500">BANK:</span> <span class="font-bold text-blue-400 uppercase">OPay</span></div>
                    <div class="flex justify-between text-xs"><span class="text-gray-500">ACC NO:</span> <span class="font-bold tracking-widest">8123456789</span></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="confirmAction('req1', 'PAID', 'green')" class="bg-green-500 text-black font-black py-4 rounded-2xl text-xs uppercase">Mark Paid</button>
                    <button onclick="showDecline('req1')" class="bg-red-600/20 text-red-500 border border-red-500/30 font-black py-4 rounded-2xl text-xs uppercase">Decline</button>
                </div>

                <div id="decline-req1" class="hidden mt-6 pt-6 border-t border-gray-800">
                    <textarea id="reason-req1" placeholder="Type reason for decline..." class="w-full bg-[#0b0f1a] border border-gray-800 rounded-xl p-4 text-xs outline-none focus:border-red-500 h-24 mb-4"></textarea>
                    <button onclick="confirmAction('req1', 'DECLINED', 'red')" class="w-full bg-red-600 text-white font-black py-3 rounded-xl text-xs">Confirm Decline</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(tabId).classList.remove('hidden');
            btn.classList.add('active-tab');
        }

        function showDecline(id) {
            document.getElementById('decline-' + id).classList.toggle('hidden');
        }

        function confirmAction(id, status, color) {
            let reason = status === 'DECLINED' ? document.getElementById('reason-' + id).value : '';
            if(status === 'DECLINED' && !reason) { alert("Enter a reason!"); return; }
            
            document.getElementById(id).innerHTML = `
                <div class="text-center py-10">
                    <i class="fas fa-${status === 'PAID' ? 'check' : 'times'}-circle text-4xl text-${color}-500 mb-4"></i>
                    <p class="font-black text-${color}-500 uppercase tracking-widest">${status} SUCCESSFULLY</p>
                    ${reason ? `<p class="text-[10px] text-gray-500 mt-2 px-6 italic">Reason: ${reason}</p>` : ''}
                </div>
            `;
        }
    </script>
</body>
</html>
