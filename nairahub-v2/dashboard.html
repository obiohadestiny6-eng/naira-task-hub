<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NairaTask</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }</style>
</head>
<body class="pb-24">

    <div class="bg-white px-6 py-4 border-b border-gray-100 flex justify-between items-center sticky top-0 z-50">
        <div class="flex flex-col">
            <h1 class="text-lg font-black text-gray-900 leading-tight">Naira<span class="text-green-500">Task</span></h1>
            <div id="userName" class="text-[10px] font-bold text-gray-400 bg-gray-50 px-2 py-0.5 rounded-md mt-1 w-fit uppercase tracking-tighter">Syncing Profile...</div>
        </div>
        <button onclick="logoutUser()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-red-100 active:scale-95 transition">Logout 🚪</button>
    </div>

    <div class="p-6">
        <div class="bg-gradient-to-br from-green-500 to-green-700 p-8 rounded-[32px] text-white shadow-xl relative overflow-hidden">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-white opacity-10 rounded-full"></div>
            <p class="text-green-100 text-sm font-medium relative z-10">Available Balance</p>
            <h2 class="text-5xl font-black mt-2 tracking-tighter relative z-10">₦<span id="balance">0.00</span></h2>
            <button onclick="window.location.href='withdraw.html'" class="mt-8 w-full bg-white text-green-700 font-extrabold py-4 rounded-2xl active:scale-95 transition shadow-lg">Withdraw Funds 💰</button>
        </div>

        <button onclick="window.location.href='payouts.html'" class="w-full mt-4 bg-white border border-gray-200 text-gray-500 font-bold py-4 rounded-2xl flex justify-between items-center px-6 shadow-sm active:scale-95 transition">
            <span class="text-[11px] uppercase tracking-widest">View Payout History</span>
            <span class="text-green-500 text-lg">➔</span>
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAPJbdsaGPxgdrb4pTxyQwybqJ4xJ_RCVQ",
            authDomain: "nairataskhub-v2.firebaseapp.com",
            projectId: "nairataskhub-v2",
            storageBucket: "nairataskhub-v2.firebasestorage.app",
            messagingSenderId: "817684965148",
            appId: "1:817684965148:web:0e3439fd6072b955a77cd9",
            measurementId: "G-YXFR5937ZV"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function logoutUser() {
            if(confirm("Log out of your session?")) {
                firebase.auth().signOut().then(() => { window.location.replace("index.html"); });
            }
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('userName').innerText = user.email.split('@')[0];
                db.collection('users').doc(user.uid).onSnapshot((doc) => {
                    if (doc.exists) {
                        document.getElementById('balance').innerText = doc.data().balance.toLocaleString(undefined, {minimumFractionDigits: 2});
                    }
                });
            } else {
                // Wait 4 seconds for session retrieval before kicking to login
                setTimeout(() => { if (!firebase.auth().currentUser) window.location.replace("index.html"); }, 4000);
            }
        });
    </script>
</body>
</html>
