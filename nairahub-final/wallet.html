<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | NairaTaskHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white font-sans pb-24">

    <nav class="bg-gray-800 p-4 border-b border-gray-700 flex items-center sticky top-0 z-50">
        <a href="dashboard.html" class="text-green-400 mr-4 text-xl"><i class="fas fa-arrow-left"></i></a>
        <h1 class="text-xl font-bold text-green-400 uppercase italic">My Wallet</h1>
    </nav>

    <div class="p-6 max-w-lg mx-auto">
        <div class="bg-gradient-to-br from-green-600 to-green-800 p-8 rounded-3xl shadow-2xl text-center mb-10">
            <p class="text-green-100 text-xs uppercase tracking-widest opacity-80 font-bold">Total Balance</p>
            <h2 class="text-5xl font-black mt-2 italic tracking-tighter">₦25,400</h2>
            <button onclick="document.getElementById('wModal').style.display='flex'" class="mt-6 w-full bg-white text-green-800 font-black py-4 rounded-2xl shadow-lg hover:scale-95 transition">WITHDRAW FUNDS</button>
        </div>

        <h3 class="text-xs font-black text-gray-500 uppercase tracking-[0.2em] mb-4">Recent Activity</h3>
        <div class="bg-gray-800/50 border border-gray-700 rounded-2xl p-5 mb-4">
            <div class="flex justify-between items-center mb-3">
                <p class="font-bold text-lg">₦5,000</p>
                <span class="bg-yellow-900/30 text-yellow-500 text-[9px] px-3 py-1 rounded-full font-black uppercase">Pending</span>
            </div>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Requested on April 3, 2026</p>
        </div>
    </div>

    <div id="wModal" class="fixed inset-0 bg-black/95 z-[100] hidden items-center justify-center p-4">
        <div class="bg-gray-800 w-full max-w-md rounded-[2.5rem] border border-gray-700 p-8 relative">
            <button onclick="document.getElementById('wModal').style.display='none'" class="absolute top-6 right-6 text-gray-500 text-2xl hover:text-white">&times;</button>
            
            <h3 class="text-2xl font-black text-green-400 italic mb-6">Withdrawal Details</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-bold ml-2 mb-1 block">Withdrawal Amount</label>
                    <input type="number" id="amt" placeholder="₦0.00" class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none focus:border-green-500 transition">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-bold ml-2 mb-1 block">Account Holder Name</label>
                    <input type="text" id="accName" placeholder="Full name on bank account" class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none focus:border-green-500 transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold ml-2 mb-1 block">Bank Name</label>
                        <input type="text" id="bank" placeholder="OPay, Kuda..." class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none focus:border-green-500 transition">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold ml-2 mb-1 block">Account No.</label>
                        <input type="number" id="accNum" placeholder="10 Digits" class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-4 outline-none focus:border-green-500 transition">
                    </div>
                </div>
                
                <button onclick="alert('✅ Withdrawal Request Submitted!'); document.getElementById('wModal').style.display='none'" class="w-full bg-green-500 text-black font-black py-5 rounded-2xl uppercase tracking-widest mt-4 shadow-xl active:scale-95 transition">Confirm Request</button>
            </div>
        </div>
    </div>

</body>
</html>
