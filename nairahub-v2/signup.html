<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join NairaTaskHub | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafbfc; }
        .btn-gradient { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-lg border border-gray-100 text-center">
        <h1 class="text-3xl font-extrabold mb-2">Create <span class="text-green-500">Account</span></h1>
        <p class="text-gray-500 mb-8">Join the elite hub of earners.</p>

        <form id="signupForm" class="space-y-5">
            <input type="text" id="fullName" placeholder="Full Name" required class="w-full px-5 py-3 border border-gray-200 rounded-xl outline-none focus:border-green-500">
            <input type="email" id="email" placeholder="Email Address" required class="w-full px-5 py-3 border border-gray-200 rounded-xl outline-none focus:border-green-500">
            <input type="password" id="password" placeholder="Password (Min 6 chars)" required class="w-full px-5 py-3 border border-gray-200 rounded-xl outline-none focus:border-green-500">
            <button type="submit" class="w-full btn-gradient text-white py-4 rounded-2xl text-lg font-bold shadow-lg shadow-green-100">Sign Up Now</button>
        </form>

        <p class="mt-8 text-gray-600 font-medium text-sm">Already a member? <a href="index.html" class="text-green-600 font-bold underline ml-1">Log In</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPjBdsaGPxgdrb4pTxyQwYbqJ4xJ_RCVQ",
            authDomain: "nairataskhub-v2.firebaseapp.com",
            projectId: "nairataskhub-v2",
            storageBucket: "nairataskhub-v2.firebasestorage.app",
            messagingSenderId: "817684965148",
            appId: "1:817684965148:web:0e3439fd6072b955a77cd9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('fullName').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                await setDoc(doc(db, "users", user.uid), {
                    name: name,
                    email: email,
                    balance: 0,
                    joined: new Date()
                });
                alert("Success! Account Created.");
                window.location.href = "dashboard.html";
            } catch (err) { alert(err.message); }
        });
    </script>
</body>
</html>
