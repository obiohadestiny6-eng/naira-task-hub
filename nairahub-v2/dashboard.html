<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NairaTaskHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .stat-card { background: white; border-radius: 24px; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-5px); }
        .btn-task { background: white; border: 1px solid #e2e8f0; border-radius: 16px; transition: all 0.2s; }
        .btn-task:hover { border-color: #22c55e; background: #f0fdf4; }
    </style>
</head>
<body class="pb-20">
    <div class="bg-white px-6 py-6 border-b border-gray-100 flex justify-between items-center sticky top-0 z-10">
        <h1 class="text-xl font-bold text-gray-900">Naira<span class="text-green-500">Task</span></h1>
        <div id="userName" class="text-sm font-semibold text-gray-600 bg-gray-100 px-4 py-2 rounded-full text-center">Loading...</div>
    </div>

    <div class="p-6">
        <div class="bg-gradient-to-br from-green-500 to-green-700 p-8 rounded-[32px] text-white shadow-xl shadow-green-100 relative overflow-hidden">
            <p class="text-green-100 text-sm font-medium">Available Balance</p>
            <h2 class="text-4xl font-extrabold mt-1">₦<span id="balance">0.00</span></h2>
            <button onclick="window.location.href='withdraw.html'" class="mt-6 bg-white/20 backdrop-blur-md text-white px-6 py-2 rounded-xl text-sm font-bold border border-white/30">Withdraw Funds</button>
        </div>
    </div>

    <div class="px-6 space-y-4">
        <h3 class="text-lg font-bold text-gray-900 ml-1">Tasks</h3>
        
        <div class="btn-task p-5 flex justify-between items-center">
            <div>
                <p class="font-bold text-gray-900">Follow on TikTok</p>
                <p class="text-xs text-gray-500">Reward: ₦50.00</p>
            </div>
            <button class="bg-green-500 text-white px-4 py-2 rounded-lg text-xs font-bold"><button onclick="window.location.href='tasks.html'" class="bg-green-500 text-white px-4 py-2 rounded-lg text-xs font-bold">Start</button></button>
        </div>

        <div class="btn-task p-5 flex justify-between items-center">
            <div>
                <p class="font-bold text-gray-900">YouTube Subscription</p>
                <p class="text-xs text-gray-500">Reward: ₦100.00</p>
            </div>
            <button class="bg-green-500 text-white px-4 py-2 rounded-lg text-xs font-bold">Start</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPjBdsaGPxgdrb4pTxyQwYbqJ4xJ_RCVQ",
            authDomain: "nairataskhub-v2.firebaseapp.com",
            projectId: "nairataskhub-v2",
            storageBucket: "nairataskhub-v2.firebasestorage.app",
            messagingSenderId: "817684965148",
            appId: "1:817684965148:web:0e3439fd6072b955a77cd9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    document.getElementById('userName').innerText = docSnap.data().name;
                    document.getElementById('balance').innerText = docSnap.data().balance.toFixed(2);
                }
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
