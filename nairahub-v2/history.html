<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | NairaTaskHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        /* This hides the page content until we are sure you are logged in */
        #mainContent { display: none; }
        #loader { display: flex; height: 100vh; align-items: center; justify-content: center; font-family: sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loader">
        <div class="text-center">
            <div class="w-10 h-10 border-4 border-green-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-gray-400 text-sm font-bold animate-pulse">Verifying Session...</p>
        </div>
    </div>

    <div id="mainContent" class="p-6">
        <div class="max-w-md mx-auto">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-2xl font-black text-gray-800 tracking-tight">Payout History</h1>
                <a href="dashboard.html" class="bg-white px-4 py-2 rounded-xl text-xs font-bold text-gray-500 border border-gray-200">Close</a>
            </div>

            <div id="historyList" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAPJbdsaGPxgdrb4pTxyQwybqJ4xJ_RCVQ",
            authDomain: "nairataskhub-v2.firebaseapp.com",
            projectId: "nairataskhub-v2",
            storageBucket: "nairataskhub-v2.firebasestorage.app",
            messagingSenderId: "817684965148",
            appId: "1:817684965148:web:0e3439fd6072b955a77cd9",
            measurementId: "G-YXFR5937ZV"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // THE FIXED LOGIC
        firebase.auth().onAuthStateChanged(user => {
            const loader = document.getElementById('loader');
            const content = document.getElementById('mainContent');

            if (user) {
                // USER FOUND - Show the page and hide the loader
                loader.style.display = 'none';
                content.style.display = 'block';

                db.collection('withdrawals')
                  .where('email', '==', user.email)
                  .orderBy('timestamp', 'desc')
                  .onSnapshot(snapshot => {
                      const list = document.getElementById('historyList');
                      list.innerHTML = ""; 

                      if (snapshot.empty) {
                          list.innerHTML = "<div class='text-center py-20 text-gray-400 text-sm'>No payout history yet.</div>";
                          return;
                      }

                      snapshot.forEach(doc => {
                          const data = doc.data();
                          const isApproved = data.status === 'approved';
                          const colorClass = isApproved ? 'bg-green-50 text-green-700' : 'bg-orange-50 text-orange-700';
                          
                          list.innerHTML += `
                              <div class="bg-white p-5 rounded-3xl border border-gray-100 flex justify-between items-center shadow-sm mb-2">
                                  <div>
                                      <p class="text-xl font-black text-gray-800">₦${data.amount}</p>
                                      <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">${data.bank}</p>
                                  </div>
                                  <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${colorClass}">
                                      ${data.status}
                                  </span>
                              </div>`;
                      });
                  });
            } else {
                // NO USER - Wait 3 seconds to be 100% sure before kicking them out
                setTimeout(() => {
                    if (!firebase.auth().currentUser) {
                        window.location.href = "index.html";
                    }
                }, 3000);
            }
        });
    </script>
</body>
</html>
