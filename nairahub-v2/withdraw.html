<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw | NairaTaskHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        body { background: #f8fafc; min-height: 100vh; font-family: sans-serif; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <div class="glass-card p-8">
            <h1 class="text-2xl font-black text-gray-800 mb-8">Withdraw Funds 💸</h1>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Bank Name</label>
                    <input type="text" id="bankName" placeholder="e.g. Opay, Kuda" class="w-full p-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-green-500 text-sm mt-1">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Account Name</label>
                    <input type="text" id="accHolder" placeholder="Full Name on Account" class="w-full p-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-green-500 text-sm mt-1">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Account Number</label>
                    <input type="number" id="accNum" placeholder="0000000000" class="w-full p-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-green-500 text-sm mt-1">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Amount</label>
                    <input type="number" id="amount" placeholder="₦ 0.00" class="w-full p-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-green-500 text-sm mt-1">
                </div>
                
                <button onclick="requestMoney()" id="payBtn" class="w-full bg-green-600 text-white font-black py-5 rounded-2xl shadow-lg shadow-green-100 hover:bg-green-700 transition mt-4">
                    Send Request
                </button>
            </div>

            <a href="dashboard.html" class="block text-center mt-8 text-gray-400 text-xs font-bold uppercase tracking-widest">Cancel & Back</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAPJbdsaGPxgdrb4pTxyQwybqJ4xJ_RCVQ",
            authDomain: "nairataskhub-v2.firebaseapp.com",
            projectId: "nairataskhub-v2",
            storageBucket: "nairataskhub-v2.firebasestorage.app",
            messagingSenderId: "817684965148",
            appId: "1:817684965148:web:0e3439fd6072b955a77cd9",
            measurementId: "G-YXFR5937ZV"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        async function requestMoney() {
            const user = auth.currentUser;
            if(!user) return window.location.href = "index.html";

            const bank = document.getElementById('bankName').value;
            const holder = document.getElementById('accHolder').value;
            const acc = document.getElementById('accNum').value;
            const amt = document.getElementById('amount').value;

            if(!bank || !holder || !acc || !amt) return alert("Please complete all details");

            const btn = document.getElementById('payBtn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                await db.collection('withdrawals').add({
                    email: user.email,
                    bank: bank,
                    accountHolder: holder,
                    accountNumber: acc,
                    amount: amt,
                    status: 'pending',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Success! Check your history for updates.");
                window.location.href = "dashboard.html";
            } catch (e) {
                alert("Error: " + e.message);
                btn.innerText = "Send Request";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
