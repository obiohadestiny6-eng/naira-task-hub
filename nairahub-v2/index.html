<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NairaTaskHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md bg-white p-10 rounded-[40px] shadow-xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-gray-900">Naira<span class="text-green-500">Task</span></h1>
            <p class="text-gray-400 text-sm font-semibold mt-2 uppercase tracking-widest">Premium Earning Portal</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <input type="email" id="email" placeholder="Email Address" required 
                class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition">
            <input type="password" id="password" placeholder="Password" required 
                class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition">
            
            <button type="submit" id="loginBtn" 
                class="w-full bg-green-600 text-white py-4 rounded-2xl font-extrabold text-lg shadow-lg shadow-green-100 active:scale-95 transition">
                Sign In ➔
            </button>
        </form>

        <p class="text-center mt-8 text-gray-500 font-medium text-sm">
            New member? <a href="signup.html" class="text-green-600 font-bold hover:underline">Create Account</a>
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAPJbdsaGPxgdrb4pTxyQwybqJ4xJ_RCVQ",
            authDomain: "nairataskhub-v2.firebaseapp.com",
            projectId: "nairataskhub-v2",
            storageBucket: "nairataskhub-v2.firebasestorage.app",
            messagingSenderId: "817684965148",
            appId: "1:817684965148:web:0e3439fd6072b955a77cd9"
        };
        firebase.initializeApp(firebaseConfig);

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            btn.innerText = "Verifying...";
            btn.disabled = true;

            // FORCE BROWSER TO REMEMBER LOGIN
            firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL)
                .then(() => {
                    return firebase.auth().signInWithEmailAndPassword(email, pass);
                })
                .then(() => {
                    window.location.href = "dashboard.html";
                })
                .catch((error) => {
                    alert("Error: " + error.message);
                    btn.innerText = "Sign In ➔";
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
