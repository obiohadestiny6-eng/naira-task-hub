<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw | NairaTaskHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        body { background: #fdfdfd; min-height: 100vh; }
        .premium-card { background: white; border-radius: 24px; border: 1px solid #e5e7eb; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex items-center justify-center p-6">
    <div class="premium-card w-full max-w-md p-8">
        <h1 class="text-2xl font-bold text-green-700 text-center mb-6">Withdraw Funds</h1>
        <div class="space-y-4">
            <input type="text" id="bankName" placeholder="Bank Name (e.g. Kuda, Opay)" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
            <input type="number" id="accNum" placeholder="Account Number" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
            <input type="number" id="amount" placeholder="Amount to Withdraw" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
            <button onclick="requestMoney()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 transition">Request Payout</button>
            <a href="dashboard.html" class="block text-center text-green-600 font-medium">Back to Home</a>
        </div>
    </div>

    <script>
        // Use the same Firebase config you have in your index.html
        const firebaseConfig = { 
            apiKey: "PASTE_YOUR_KEY_HERE",
            authDomain: "nairataskhub-v2.firebaseapp.com",
            projectId: "nairataskhub-v2",
            storageBucket: "nairataskhub-v2.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function requestMoney() {
            const user = firebase.auth().currentUser;
            const bank = document.getElementById('bankName').value;
            const acc = document.getElementById('accNum').value;
            const amt = document.getElementById('amount').value;

            if(!bank || !acc || !amt) return alert("Please fill all fields");

            await db.collection('withdrawals').add({
                email: user.email,
                bank: bank,
                account: acc,
                amount: amt,
                status: 'pending'
            });
            alert("Request sent! Destiny will process your payment soon.");
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
