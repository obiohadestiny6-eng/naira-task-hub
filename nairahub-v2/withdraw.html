<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw | NairaTaskHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        body { background: #fdfdfd; min-height: 100vh; }
        .premium-card { background: white; border-radius: 24px; border: 1px solid #e5e7eb; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <div class="premium-card p-8 mb-8">
            <h1 class="text-2xl font-bold text-green-700 text-center mb-6">Withdraw Funds</h1>
            <div class="space-y-4">
                <input type="text" id="bankName" placeholder="Bank Name (e.g. Kuda, Opay)" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
                
                <input type="text" id="accHolder" placeholder="Account Holder Name" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
                
                <input type="number" id="accNum" placeholder="Account Number" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
                <input type="number" id="amount" placeholder="Amount to Withdraw" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-green-500">
                
                <button onclick="requestMoney()" id="payBtn" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 transition">
                    Request Payout
                </button>
                <a href="dashboard.html" class="block text-center text-green-600 font-medium">Back to Home</a>
            </div>
        </div>

        <div class="mt-10">
            <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">Your Payout History</h2>
            <div id="historyList" class="space-y-3">
                <p class="text-center text-gray-400 text-sm">Loading history...</p>
            </div>
        </div>
    </div>

    <script>
        // YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAPJbdsaGPxgdrb4pTxyQwybqJ4xJ_RCVQ",
            authDomain: "nairataskhub-v2.firebaseapp.com",
            projectId: "nairataskhub-v2",
            storageBucket: "nairataskhub-v2.firebasestorage.app",
            messagingSenderId: "817684965148",
            appId: "1:817684965148:web:0e3439fd6072b955a77cd9",
            measurementId: "G-YXFR5937ZV"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        async function requestMoney() {
            const user = auth.currentUser;
            if(!user) return alert("Please log in first!");

            const bank = document.getElementById('bankName').value;
            const holder = document.getElementById('accHolder').value;
            const acc = document.getElementById('accNum').value;
            const amt = document.getElementById('amount').value;

            if(!bank || !holder || !acc || !amt) return alert("Please fill all fields");

            document.getElementById('payBtn').innerText = "Processing...";

            try {
                await db.collection('withdrawals').add({
                    email: user.email,
                    bank: bank,
                    accountHolder: holder,
                    accountNumber: acc,
                    amount: amt,
                    status: 'pending',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Withdrawal Request Sent!");
                document.getElementById('payBtn').innerText = "Request Payout";
            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        // AUTO-LOAD HISTORY SCRIPT
        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection('withdrawals')
                  .where('email', '==', user.email)
                  .onSnapshot(snapshot => {
                      const historyList = document.getElementById('historyList');
                      historyList.innerHTML = ""; 

                      if (snapshot.empty) {
                          historyList.innerHTML = "<p class='text-center text-gray-400 text-sm'>No history yet.</p>";
                          return;
                      }

                      snapshot.forEach(doc => {
                          const data = doc.data();
                          const statusColor = data.status === 'approved' ? 'text-green-600' : 'text-orange-500';
                          
                          historyList.innerHTML += `
                              <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex justify-between items-center mb-3">
                                  <div>
                                      <p class="font-bold text-gray-800 text-lg">₦${data.amount}</p>
                                      <p class="text-xs text-gray-500">${data.bank} - ${data.accountNumber}</p>
                                  </div>
                                  <div class="text-right">
                                      <p class="text-xs font-bold uppercase tracking-wider ${statusColor}">${data.status}</p>
                                  </div>
                              </div>
                          `;
                      });
                  });
            }
        });
    </script>
</body>
</html>
