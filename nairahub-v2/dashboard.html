<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NairaTaskHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .stat-card { background: white; border-radius: 24px; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-5px); }
        .btn-task { background: white; border: 1px solid #e2e8f0; border-radius: 16px; transition: all 0.2s; }
        .btn-task:hover { border-color: #22c55e; background: #f0fdf4; }
    </style>
</head>
<body class="pb-20"> <div class="absolute top-5 right-6 z-20">
    <button onclick="logoutUser()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider border border-red-100 transition active:scale-90">
        Logout 🚪
    </button>
</div>
   <div class="bg-white px-6 py-4 border-b border-gray-100 flex justify-between items-center sticky top-0 z-10">
        <div class="flex flex-col">
            <h1 class="text-lg font-black text-gray-900 leading-tight">Naira<span class="text-green-500">Task</span></h1>
            <div id="userName" class="text-[10px] font-bold text-gray-400 bg-gray-50 px-2 py-0.5 rounded-md mt-1 w-fit">Loading...</div>
        </div>
        
        <button onclick="logoutUser()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider border border-red-100 active:scale-95 transition">
            Logout 🚪
        </button>
    </div>
</div>
    </div>

    <div class="p-6">
        <div class="bg-gradient-to-br from-green-500 to-green-700 p-8 rounded-[32px] text-white shadow-xl shadow-green-100 relative overflow-hidden">
            <p class="text-green-100 text-sm font-medium">Available Balance</p>
           <h2 class="text-5xl font-black mt-2 tracking-tighter">₦<span id="balance">0.00</span></h2>
            
            <button onclick="window.location.href='withdraw.html'" class="mt-6 w-full bg-white text-green-700 font-extrabold py-4 rounded-2xl shadow-md transition active:scale-95">
                Withdraw Funds 💰
            </button>
        </div>

   <button onclick="window.location.href='payouts.html'" class="w-full mt-4 bg-white border border-gray-200 text-gray-500 font-bold py-2 rounded-xl flex justify-between items-center px-5 transition active:scale-95">
    <span class="text-xs">View Payout History</span>
    <span class="text-green-600 text-sm">➔</span>
</button>
            <span class="text-xs">View Payout History</span>
            <span class="text-green-600 text-sm">➔</span>
        </button>
    </div>

    <div class="px-6 space-y-4">
        <h3 class="text-lg font-bold text-gray-900 ml-1">Tasks</h3>
        
        <div class="btn-task p-5 flex justify-between items-center">
            <div>
                <p class="font-bold text-gray-900">Follow on TikTok</p>
                <p class="text-xs text-gray-500">Reward: ₦50.00</p>
            </div>
            <button class="bg-green-500 text-white px-4 py-2 rounded-lg text-xs font-bold"><button onclick="window.location.href='tasks.html'" class="bg-green-500 text-white px-4 py-2 rounded-lg text-xs font-bold">Start</button></button>
        </div>

        <div class="btn-task p-5 flex justify-between items-center">
            <div>
                <p class="font-bold text-gray-900">YouTube Subscription</p>
                <p class="text-xs text-gray-500">Reward: ₦100.00</p>
            </div>
            <button class="bg-green-500 text-white px-4 py-2 rounded-lg text-xs font-bold">Start</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPjBdsaGPxgdrb4pTxyQwYbqJ4xJ_RCVQ",
            authDomain: "nairataskhub-v2.firebaseapp.com",
            projectId: "nairataskhub-v2",
            storageBucket: "nairataskhub-v2.firebasestorage.app",
            messagingSenderId: "817684965148",
            appId: "1:817684965148:web:0e3439fd6072b955a77cd9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    document.getElementById('userName').innerText = docSnap.data().name;
                    document.getElementById('balance').innerText = docSnap.data().balance.toFixed(2);
                }
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
