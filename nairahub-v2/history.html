<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My History | NairaTaskHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        body { background-color: #f9fafb; font-family: sans-serif; }
        .tab-active { border-bottom: 3px solid #16a34a; color: #16a34a; font-weight: 800; }
        .history-card { background: white; border-radius: 20px; border: 1px solid #f1f5f9; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-black text-gray-900 tracking-tight">Withdrawal History</h1>
            <button onclick="window.location.href='dashboard.html'" class="text-xs font-bold text-gray-400 uppercase">Back</button>
        </div>

        <div class="flex border-b border-gray-100 mb-6">
            <button id="btnPending" onclick="switchTab('pending')" class="flex-1 py-3 text-sm text-gray-400 font-bold tab-active">Pending</button>
            <button id="btnApproved" onclick="switchTab('approved')" class="flex-1 py-3 text-sm text-gray-400 font-bold">Approved</button>
        </div>

        <div id="authError" class="hidden py-20 text-center">
            <p class="text-gray-400 text-sm mb-4">Please log in to view history</p>
            <a href="index.html" class="bg-green-600 text-white px-6 py-2 rounded-full font-bold text-xs uppercase">Go to Login</a>
        </div>

        <div id="loader" class="py-20 text-center">
            <div class="w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
            <p class="text-gray-400 text-[10px] font-bold uppercase">Syncing Database...</p>
        </div>

        <div id="historyList" class="hidden space-y-3"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAPJbdsaGPxgdrb4pTxyQwybqJ4xJ_RCVQ",
            authDomain: "nairataskhub-v2.firebaseapp.com",
            projectId: "nairataskhub-v2",
            storageBucket: "nairataskhub-v2.firebasestorage.app",
            messagingSenderId: "817684965148",
            appId: "1:817684965148:web:0e3439fd6072b955a77cd9",
            measurementId: "G-YXFR5937ZV"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentTab = 'pending';
        let allData = [];

        // FIXED AUTH: Removed the "window.location" redirect
        auth.onAuthStateChanged(user => {
            if (user) {
                fetchData(user.email);
            } else {
                // If no user, show a button instead of kicking them out
                document.getElementById('loader').style.display = 'none';
                document.getElementById('authError').classList.remove('hidden');
            }
        });

        function fetchData(email) {
            db.collection('withdrawals')
                .where('email', '==', email)
                .orderBy('timestamp', 'desc')
                .onSnapshot(snapshot => {
                    allData = snapshot.docs.map(doc => doc.data());
                    renderList();
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('historyList').classList.remove('hidden');
                }, error => {
                    console.error("Firestore Error:", error);
                });
        }

        function switchTab(status) {
            currentTab = status;
            document.getElementById('btnPending').classList.toggle('tab-active', status === 'pending');
            document.getElementById('btnApproved').classList.toggle('tab-active', status === 'approved');
            renderList();
        }

        function renderList() {
            const list = document.getElementById('historyList');
            const filtered = allData.filter(item => item.status === currentTab);
            
            list.innerHTML = "";
            if (filtered.length === 0) {
                list.innerHTML = `<p class="text-center py-20 text-gray-300 text-xs">No ${currentTab} requests found.</p>`;
                return;
            }

            filtered.forEach(data => {
                const badgeColor = data.status === 'approved' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700';
                list.innerHTML += `
                    <div class="history-card p-5 flex justify-between items-center">
                        <div>
                            <p class="text-xl font-black text-gray-800">₦${data.amount}</p>
                            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">${data.bank}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${badgeColor}">${data.status}</span>
                    </div>`;
            });
        }
    </script>
</body>
</html>
